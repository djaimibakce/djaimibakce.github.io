<!DOCTYPE html>
<html>
<head>
<title>Dr. Djaimi Bakce</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6f9; }

header {
    background:#1f2d3d;
    color:white;
    padding:30px;
    display:flex;
    align-items:center;
}

header img {
    width:130px;
    border-radius:50%;
    margin-right:20px;
}

.container {
    max-width:1100px;
    margin:auto;
    background:white;
    padding:30px;
}

h2 {
    border-bottom:2px solid #ddd;
    padding-bottom:5px;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ccc;
}

.pub-item {
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}

.btn {
    background:#007BFF;
    color:white;
    padding:8px 12px;
    border-radius:5px;
    margin:3px;
    cursor:pointer;
    border:none;
}

.btn-danger {
    background:#dc3545;
}

.btn-secondary {
    background:#6c757d;
}
</style>

</head>

<body>

<header>
<img src="foto.png">
<div>
<h1>Dr. Djaimi Bakce</h1>
<p>Associate Professor of Agricultural Economics</p>
</div>
</header>

<div class="container">

<h2>Publications</h2>

<h3>Add / Edit Publication</h3>

<input id="title" placeholder="Title (Wajib)">
<input id="authors" placeholder="Authors">
<input id="year" placeholder="Year">
<input id="journal" placeholder="Journal">
<input id="link" placeholder="Link (DOI / PDF)">

<button class="btn" onclick="savePublication()">💾 Save</button>
<button class="btn btn-secondary" onclick="downloadData()">📄 Download</button>

<hr>

<div id="pub-list"></div>

</div>

<script>

let editIndex = -1;

function savePublication(){
    let title = document.getElementById("title").value.trim();
    if(!title){
        alert("Title wajib diisi");
        return;
    }

    let authors = document.getElementById("authors").value;
    let year = document.getElementById("year").value;
    let journal = document.getElementById("journal").value;
    let link = document.getElementById("link").value || "#";

    let data = JSON.parse(localStorage.getItem("pubs") || "[]");

    if(editIndex === -1){
        data.push({title, authors, year, journal, link});
    } else {
        data[editIndex] = {title, authors, year, journal, link};
        editIndex = -1;
    }

    localStorage.setItem("pubs", JSON.stringify(data));

    clearForm();
    render();
}

function render(){
    let container = document.getElementById("pub-list");
    container.innerHTML = "";

    let data = JSON.parse(localStorage.getItem("pubs") || "[]");

    if(data.length === 0){
        container.innerHTML = "<i>Belum ada publikasi</i>";
        return;
    }

    data.forEach((pub, index) => {
        let div = document.createElement("div");
        div.className = "pub-item";

        div.innerHTML = `
            <b><a href="${pub.link}" target="_blank">${pub.title}</a></b><br>
            ${pub.authors} (${pub.year})<br>
            <i>${pub.journal}</i><br>

            <button class="btn" onclick="editPub(${index})">✏️ Edit</button>
            <button class="btn btn-danger" onclick="deletePub(${index})">🗑 Delete</button>
        `;

        container.appendChild(div);
    });
}

function editPub(index){
    let data = JSON.parse(localStorage.getItem("pubs") || "[]");
    let pub = data[index];

    document.getElementById("title").value = pub.title;
    document.getElementById("authors").value = pub.authors;
    document.getElementById("year").value = pub.year;
    document.getElementById("journal").value = pub.journal;
    document.getElementById("link").value = pub.link;

    editIndex = index;
}

function deletePub(index){
    let data = JSON.parse(localStorage.getItem("pubs") || "[]");
    data.splice(index,1);
    localStorage.setItem("pubs", JSON.stringify(data));
    render();
}

function clearForm(){
    document.getElementById("title").value = "";
    document.getElementById("authors").value = "";
    document.getElementById("year").value = "";
    document.getElementById("journal").value = "";
    document.getElementById("link").value = "";
}

function downloadData(){
    let data = localStorage.getItem("pubs");
    if(!data){
        alert("Belum ada data");
        return;
    }

    let blob = new Blob([data], {type: "text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "publications.txt";
    a.click();
}

window.onload = function(){
    render();
};

</script>

</body>
</html>
