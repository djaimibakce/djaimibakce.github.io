<!DOCTYPE html>
<html>
<head>
<title>Dr. Djaimi Bakce</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6f9; }

header {
    background:#1f2d3d;
    color:white;
    padding:30px;
    display:flex;
    align-items:center;
}

header img {
    width:130px;
    border-radius:50%;
    margin-right:20px;
}

.container {
    max-width:1100px;
    margin:auto;
    background:white;
    padding:30px;
}

h2 {
    border-bottom:2px solid #ddd;
    padding-bottom:5px;
}

input, select {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

.pub-item {
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}

.badge {
    background:#007BFF;
    color:white;
    padding:3px 8px;
    border-radius:5px;
    font-size:12px;
}

.btn {
    background:#007BFF;
    color:white;
    padding:8px 12px;
    border-radius:5px;
    margin:3px;
    cursor:pointer;
    border:none;
}

.btn-danger { background:#dc3545; }
.btn-secondary { background:#6c757d; }

.search {
    margin-bottom:20px;
}
</style>

</head>

<body>

<header>
<img src="foto.png">
<div>
<h1>Dr. Djaimi Bakce</h1>
<p>Associate Professor of Agricultural Economics</p>
</div>
</header>

<div class="container">

<h2>Publications</h2>

<input class="search" id="search" placeholder="🔍 Search publication..." onkeyup="render()">

<h3>Add / Edit Publication</h3>

<input id="title" placeholder="Title (Wajib)">
<input id="authors" placeholder="Authors">
<input id="year" placeholder="Year">
<input id="journal" placeholder="Journal">
<input id="link" placeholder="Link (DOI / PDF)">

<select id="category">
<option>Scopus</option>
<option>Nasional</option>
<option>Buku</option>
</select>

<input id="cite" placeholder="Citation (angka)">

<button class="btn" onclick="savePublication()">💾 Save</button>
<button class="btn btn-secondary" onclick="downloadData()">📄 Download</button>

<hr>

<div id="pub-list"></div>

</div>

<script>

let editIndex = -1;

function savePublication(){
    let title = document.getElementById("title").value.trim();
    if(!title){
        alert("Title wajib diisi");
        return;
    }

    let pub = {
        title,
        authors: document.getElementById("authors").value,
        year: document.getElementById("year").value,
        journal: document.getElementById("journal").value,
        link: document.getElementById("link").value || "#",
        category: document.getElementById("category").value,
        cite: document.getElementById("cite").value || "0"
    };

    let data = JSON.parse(localStorage.getItem("pubs") || "[]");

    if(editIndex === -1){
        data.push(pub);
    } else {
        data[editIndex] = pub;
        editIndex = -1;
    }

    localStorage.setItem("pubs", JSON.stringify(data));

    clearForm();
    render();
}

function render(){
    let container = document.getElementById("pub-list");
    container.innerHTML = "";

    let keyword = document.getElementById("search").value.toLowerCase();
    let data = JSON.parse(localStorage.getItem("pubs") || "[]");

    let filtered = data.filter(p => p.title.toLowerCase().includes(keyword));

    if(filtered.length === 0){
        container.innerHTML = "<i>Tidak ada publikasi</i>";
        return;
    }

    filtered.forEach((pub, index) => {
        let div = document.createElement("div");
        div.className = "pub-item";

        div.innerHTML = `
            <b><a href="${pub.link}" target="_blank">${pub.title}</a></b>
            <span class="badge">${pub.category}</span><br>

            ${pub.authors} (${pub.year})<br>
            <i>${pub.journal}</i><br>

            📊 Citations: ${pub.cite}<br>

            <button class="btn" onclick="editPub(${index})">✏️ Edit</button>
            <button class="btn btn-danger" onclick="deletePub(${index})">🗑 Delete</button>
        `;

        container.appendChild(div);
    });
}

function editPub(index){
    let data = JSON.parse(localStorage.getItem("pubs") || "[]");
    let pub = data[index];

    document.getElementById("title").value = pub.title;
    document.getElementById("authors").value = pub.authors;
    document.getElementById("year").value = pub.year;
    document.getElementById("journal").value = pub.journal;
    document.getElementById("link").value = pub.link;
    document.getElementById("category").value = pub.category;
    document.getElementById("cite").value = pub.cite;

    editIndex = index;
}

function deletePub(index){
    let data = JSON.parse(localStorage.getItem("pubs") || "[]");
    data.splice(index,1);
    localStorage.setItem("pubs", JSON.stringify(data));
    render();
}

function clearForm(){
    document.querySelectorAll("input").forEach(i => i.value = "");
}

function downloadData(){
    let data = localStorage.getItem("pubs");
    let blob = new Blob([data], {type: "text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "publications.txt";
    a.click();
}

window.onload = render;

</script>

</body>
</html>
