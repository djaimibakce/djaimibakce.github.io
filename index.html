<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dr. Djaimi Bakce</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6f9; }

header {
  background:#1f2d3d;
  color:white;
  padding:30px;
  display:flex;
  align-items:center;
}

header img {
  width:110px;
  border-radius:50%;
  margin-right:20px;
}

.container {
  max-width:1000px;
  margin:auto;
  background:white;
  padding:25px;
}

h2 { border-bottom:2px solid #ddd; }

.item {
  margin-bottom:12px;
  padding-bottom:10px;
  border-bottom:1px solid #eee;
}

.category {
  margin-top:25px;
}
</style>

</head>

<body>

<header>
<img src="foto.png">
<div>
<h1>Dr. Djaimi Bakce</h1>
<p>Associate Professor of Agricultural Economics</p>
<a href="cv.pdf" style="color:white;">📄 Download CV</a>
</div>
</header>

<div class="container">

<h2>Publications</h2>
<div id="content">Loading...</div>

</div>

<script>

fetch("data.json")
.then(res => res.json())
.then(data => {

  data.sort((a,b)=>b.year-a.year);

  let groups = {};

  data.forEach(d=>{
    if(!groups[d.category]) groups[d.category]=[];
    groups[d.category].push(d);
  });

  let html="";

  for(let cat in groups){
    html += `<div class="category"><h3>${cat}</h3>`;

    groups[cat].forEach(d=>{
      html += `
      <div class="item">
        <b>${d.title}</b><br>
        ${d.authors} (${d.year})<br>
        <i>${d.journal}</i><br>
        <a href="${d.link}" target="_blank">View</a>
      </div>
      `;
    });

    html += "</div>";
  }

  document.getElementById("content").innerHTML = html;

})
.catch(()=>{
  document.getElementById("content").innerHTML = "No data yet";
});

</script>

</body>
</html>
