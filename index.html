<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dr. Djaimi Bakce</title>

<style>
body { font-family:Segoe UI; margin:0; background:#f4f6f9; }

header {
  background:#1f2d3d;
  color:white;
  padding:30px;
  display:flex;
  align-items:center;
}

header img {
  width:110px;
  border-radius:50%;
  margin-right:20px;
}

.container {
  max-width:1000px;
  margin:auto;
  background:white;
  padding:25px;
}

input, select {
  width:100%;
  padding:8px;
  margin-bottom:8px;
}

button {
  padding:6px 10px;
  margin:3px;
  background:#007BFF;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.item {
  margin-bottom:10px;
  border-bottom:1px solid #eee;
  padding-bottom:8px;
}

.admin-box {
  display:none;
  background:#eef;
  padding:15px;
  margin-bottom:20px;
}
</style>

</head>

<body>

<header>
<img src="foto.png">
<div>
<h1>Dr. Djaimi Bakce</h1>
<p>Associate Professor of Agricultural Economics</p>
<a href="cv.pdf" style="color:white;">📄 CV</a>
</div>
</header>

<div class="container">

<button onclick="toggleAdmin()">🔒 Admin Mode</button>

<div class="admin-box" id="adminBox">

<h3>Add Publication</h3>

<input id="title" placeholder="Title">
<input id="authors" placeholder="Authors">
<input id="year" placeholder="Year">
<input id="journal" placeholder="Journal">
<input id="link" placeholder="Link">

<select id="category">
<option>Journal Articles</option>
<option>Proceedings</option>
<option>Conference Papers</option>
<option>Books</option>
<option>Teaching Materials</option>
<option>Media Publications</option>
<option>Photos & Videos</option>
<option>Others</option>
</select>

<button onclick="save()">Save</button>

</div>

<h2>Publications</h2>
<div id="content"></div>

</div>

<script>

let admin=false;
let data = JSON.parse(localStorage.getItem("data")||"[]");

function toggleAdmin(){
  admin=!admin;
  document.getElementById("adminBox").style.display = admin?"block":"none";
}

function save(){
  let item = {
    title:title.value,
    authors:authors.value,
    year:parseInt(year.value)||0,
    journal:journal.value,
    link:link.value,
    category:category.value
  };

  data.push(item);
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

function render(){

  data.sort((a,b)=>b.year-a.year);

  let groups={};

  data.forEach(d=>{
    if(!groups[d.category]) groups[d.category]=[];
    groups[d.category].push(d);
  });

  let html="";

  for(let cat in groups){
    html+=`<h3>${cat}</h3>`;

    groups[cat].forEach(d=>{
      html+=`
      <div class="item">
        <b>${d.title}</b><br>
        ${d.authors} (${d.year})<br>
        <i>${d.journal}</i><br>
        <a href="${d.link}" target="_blank">View</a>
      </div>`;
    });
  }

  content.innerHTML = html || "No data";
}

render();

</script>

</body>
</html>
