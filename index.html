<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dr. Djaimi Bakce</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background:#1f2d3d; color:white; padding:30px;
  display:flex; align-items:center;
}
header img { width:110px; border-radius:50%; margin-right:20px; }

.container {
  max-width:900px; margin:auto; background:white; padding:25px;
}

h2 { border-bottom:2px solid #ddd; padding-bottom:5px; }

input {
  width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc;
}

button {
  padding:8px 12px; border:none; border-radius:5px;
  background:#007BFF; color:white; cursor:pointer; margin:3px;
}

.btn-danger { background:#dc3545; }

.item {
  border-bottom:1px solid #eee;
  margin-bottom:10px;
  padding-bottom:10px;
}
</style>
</head>

<body>

<header>
<img src="foto.png">
<div>
<h1>Dr. Djaimi Bakce</h1>
<p>Associate Professor of Agricultural Economics</p>
</div>
</header>

<div class="container">

<h2>Publications</h2>

<input id="title" placeholder="Title (wajib)">
<input id="authors" placeholder="Authors">
<input id="year" placeholder="Year">
<input id="journal" placeholder="Journal">
<input id="link" placeholder="Link">

<button onclick="save()">Save</button>

<hr>

<div id="list"></div>

</div>

<script>

let editIndex = -1;

function save(){
  let title = document.getElementById("title").value.trim();
  if(!title){
    alert("Title wajib diisi");
    return;
  }

  let data = JSON.parse(localStorage.getItem("data") || "[]");

  let item = {
    title: title,
    authors: document.getElementById("authors").value,
    year: document.getElementById("year").value,
    journal: document.getElementById("journal").value,
    link: document.getElementById("link").value
  };

  if(editIndex === -1){
    data.push(item);
  } else {
    data[editIndex] = item;
    editIndex = -1;
  }

  localStorage.setItem("data", JSON.stringify(data));

  clearForm();
  show();
}

function show(){
  let data = JSON.parse(localStorage.getItem("data") || "[]");
  let html = "";

  data.forEach((d,i)=>{
    html += `
      <div class="item">
        <b>${d.title}</b><br>
        ${d.authors} (${d.year})<br>
        <i>${d.journal}</i><br>
        <a href="${d.link}" target="_blank">${d.link}</a><br>
        <button onclick="edit(${i})">Edit</button>
        <button class="btn-danger" onclick="del(${i})">Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function edit(i){
  let data = JSON.parse(localStorage.getItem("data") || "[]");
  let d = data[i];

  document.getElementById("title").value = d.title;
  document.getElementById("authors").value = d.authors;
  document.getElementById("year").value = d.year;
  document.getElementById("journal").value = d.journal;
  document.getElementById("link").value = d.link;

  editIndex = i;
}

function del(i){
  let data = JSON.parse(localStorage.getItem("data") || "[]");
  data.splice(i,1);
  localStorage.setItem("data", JSON.stringify(data));
  show();
}

function clearForm(){
  document.querySelectorAll("input").forEach(e => e.value = "");
}

window.onload = show;

</script>

</body>
</html>
