<!DOCTYPE html>
<html>
<head>
<title>Dr. Djaimi Bakce</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6f9; }

header {
    background:#1f2d3d;
    color:white;
    padding:30px;
    display:flex;
    align-items:center;
}

header img {
    width:130px;
    border-radius:50%;
    margin-right:20px;
}

.container {
    max-width:1100px;
    margin:auto;
    background:white;
    padding:30px;
}

.btn {
    background:#007BFF;
    color:white;
    padding:10px;
    border-radius:5px;
    margin:5px;
    cursor:pointer;
}

.admin {
    position:fixed;
    bottom:20px;
    right:20px;
}

[contenteditable="true"] {
    outline:2px dashed red;
}
</style>

</head>

<body>

<header>
<img src="foto.png">
<div>
<h1>Dr. Djaimi Bakce</h1>
<p>Associate Professor of Agricultural Economics</p>
</div>
</header>

<div class="container">

<h2>Publications</h2>
<ul id="pub-list"></ul>

</div>

<div class="admin">
<button class="btn" onclick="toggleEdit()">✏️ Edit</button>
<button class="btn" onclick="addPublication()">➕ Add</button>
</div>

<script>
let editMode = false;

function toggleEdit(){
    editMode = !editMode;
    document.body.contentEditable = editMode;
    alert(editMode ? "Edit ON" : "Edit OFF");
}

function addPublication(){
    let title = prompt("Enter publication title:");
    if(title){
        let list = document.getElementById("pub-list");
        let li = document.createElement("li");
        li.textContent = title;
        list.appendChild(li);

        saveData();
    }
}

function saveData(){
    localStorage.setItem("pubs", document.getElementById("pub-list").innerHTML);
}

function loadData(){
    let data = localStorage.getItem("pubs");
    if(data){
        document.getElementById("pub-list").innerHTML = data;
    }
}

loadData();
</script>

</body>
</html>
