backend:
  name: github
  repo: djaimibakce/djaimibakce.github.io
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "publications"
    label: "Publications"
    folder: "content/publications"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "text" }
